name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Docker Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Backend
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend ./backend

    - name: Build Frontend
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend ./frontend

    - name: Push Images
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/backend
        docker push ${{ secrets.DOCKER_USERNAME }}/frontend

    - name: Deploy to VM
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd MEAN-STACK
          docker pull ${{ secrets.DOCKER_USERNAME }}/backend
          docker pull ${{ secrets.DOCKER_USERNAME }}/frontend
          docker-compose down
          docker-compose up -d
